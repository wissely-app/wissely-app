<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>System Status · Wissely</title>
<meta name="description" content="Live status of Wissely's API, dashboard, and AI analysis pipeline."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0c0c0a; --sage:#2d4a3e; --gold:#c9a84c; --gold2:#e8c97a;
  --cream:#f8f6f0; --cream2:#ede9df; --cream3:#dedad0;
  --text:#2a2a20; --muted:#6b6b55; --white:#fefefc;
  --ok:#2d4a3e; --degraded:#c9a84c; --down:#b3432f;
}
body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:56px 24px 96px}
.eyebrow{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:3px;text-transform:uppercase;color:var(--sage);font-weight:600;margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(28px,4vw,38px);font-weight:600;letter-spacing:-1px;color:var(--ink);margin-bottom:24px}

.banner{display:flex;align-items:center;gap:14px;padding:20px 24px;border-radius:14px;margin-bottom:32px}
.banner.operational{background:rgba(45,74,62,0.08);border:1px solid rgba(45,74,62,0.25)}
.banner.degraded{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.35)}
.banner.outage{background:rgba(179,67,47,0.1);border:1px solid rgba(179,67,47,0.3)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.operational{background:var(--ok)}
.dot.degraded{background:var(--degraded)}
.dot.outage{background:var(--down)}
.banner-text{font-size:14px;font-weight:600;color:var(--ink)}
.banner-sub{font-size:12px;color:var(--muted);margin-top:2px}

.card{background:var(--white);border:1px solid var(--cream3);border-radius:14px;padding:24px;margin-bottom:20px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--ink);margin-bottom:16px}
.component-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--cream2);font-size:13.5px}
.component-row:last-child{border-bottom:none}
.component-status{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;text-transform:capitalize}
.component-status.operational{color:var(--ok)}
.component-status.degraded{color:#8a6d1f}
.component-status.outage{color:var(--down)}

.incident{padding:16px 0;border-bottom:1px solid var(--cream2)}
.incident:last-child{border-bottom:none}
.incident-title{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:4px}
.incident-meta{font-size:11.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px}
.incident-update{font-size:12.5px;color:var(--muted);line-height:1.6;padding-left:12px;border-left:2px solid var(--cream3);margin-top:6px}
.empty{font-size:13px;color:var(--muted);padding:8px 0}
.status-msg{font-size:13px;color:var(--muted);text-align:center;padding:24px}
.footer-note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:32px}
.footer-note a{color:var(--sage);font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Status</div>
  <h1>Wissely System Status</h1>
  <div id="app"><p class="status-msg">Checking current status…</p></div>
  <p class="footer-note">See our <a href="sla.html">SLA and uptime commitment</a>.</p>
</div>

<script>
const app = document.getElementById('app');

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
const LABELS = { operational: 'All systems operational', degraded: 'Degraded performance', outage: 'Service outage' };
const COMPONENT_LABELS = { api: 'API', dashboard: 'Dashboard', ai_analysis: 'AI Analysis' };

async function init() {
  let data;
  try {
    const res = await fetch('/status');
    if (!res.ok) throw new Error('bad response');
    data = await res.json();
  } catch {
    app.innerHTML = '<p class="status-msg">Unable to load status right now. Please check back shortly.</p>';
    return;
  }

  const overall = data.status || 'operational';
  app.innerHTML = `
    <div class="banner ${overall}">
      <div class="dot ${overall}"></div>
      <div>
        <div class="banner-text">${LABELS[overall] || 'Status unavailable'}</div>
        ${data.message ? `<div class="banner-sub">${escapeHtml(data.message)}</div>` : ''}
        ${data.updatedAt ? `<div class="banner-sub">Last updated ${fmtDate(data.updatedAt)}</div>` : ''}
      </div>
    </div>

    <div class="card">
      <div class="card-title">Components</div>
      ${Object.entries(data.components || {}).map(([key, status]) => `
        <div class="component-row">
          <span>${COMPONENT_LABELS[key] || escapeHtml(key)}</span>
          <span class="component-status ${status}">${escapeHtml(status)}</span>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <div class="card-title">Recent incidents</div>
      ${(data.incidents && data.incidents.length) ? data.incidents.map(inc => `
        <div class="incident">
          <div class="incident-title">${escapeHtml(inc.title)}</div>
          <div class="incident-meta">${escapeHtml(inc.status)} · started ${fmtDate(inc.startedAt)}${inc.resolvedAt ? ` · resolved ${fmtDate(inc.resolvedAt)}` : ''}</div>
          ${(inc.updates || []).map(u => `<div class="incident-update">${fmtDate(u.time)} - ${escapeHtml(u.text)}</div>`).join('')}
        </div>
      `).join('') : '<p class="empty">No incidents reported in the last 90 days.</p>'}
    </div>
  `;
}

init();
</script>
</body>
</html>
