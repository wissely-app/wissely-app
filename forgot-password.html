<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wissely — Reset Password</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --sage:#2d4a3e;
  --gold:#c9a84c;
  --cream:#f8f6f0;
  --cream2:#ede9df;
  --cream3:#dedad0;
  --text:#2a2a20;
  --muted:#7a7a66;
  --white:#fefefc;
  --success:#16a34a;
  --error:#b91c1c;
}

body{
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  width:100%;
  max-width:520px;
  background:var(--white);
  border:1px solid var(--cream3);
  border-radius:24px;
  padding:40px;
  box-shadow:0 20px 50px rgba(0,0,0,.05);
}

.logo{
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:32px;
}

.logo-mark{
  width:36px;
  height:36px;
  border-radius:10px;
  background:var(--sage);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:700;
}

.logo-text{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  color:#111;
  font-weight:700;
}

h1{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;
  margin-bottom:10px;
}

.subtitle{
  color:var(--muted);
  line-height:1.6;
  margin-bottom:28px;
}

label{
  display:block;
  font-size:11px;
  font-family:'DM Mono',monospace;
  letter-spacing:1px;
  color:var(--sage);
  margin-bottom:10px;
}

input{
  width:100%;
  border:1px solid var(--cream3);
  background:var(--cream);
  border-radius:100px;
  padding:16px 22px;
  font-size:15px;
  outline:none;
}

input:focus{
  border-color:var(--sage);
}

button{
  width:100%;
  margin-top:20px;
  border:none;
  border-radius:100px;
  padding:16px;
  background:var(--gold);
  font-weight:600;
  cursor:pointer;
  transition: opacity 0.2s ease;
}

button:hover{
  opacity:.95;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.success{
  display:none;
  margin-top:20px;
  padding:14px;
  border-radius:12px;
  background:rgba(22,163,74,.08);
  border:1px solid rgba(22,163,74,.2);
  color:var(--success);
}

.error-box {
  display:none;
  margin-top:20px;
  padding:14px;
  border-radius:12px;
  background:rgba(185,28,28,.08);
  border:1px solid rgba(185,28,28,.2);
  color:var(--error);
  font-size:14px;
}

.back-link{
  display:block;
  text-align:center;
  margin-top:20px;
  color:var(--sage);
  text-decoration:none;
}
</style>
</head>
<body>

<div class="card">

  <a href="index.html" class="logo">
    <div class="logo-mark">W</div>
    <div class="logo-text">Wissely</div>
  </a>

  <h1>Forgot Password?</h1>

  <p class="subtitle">
    Enter your account email address and we'll send password reset instructions.
  </p>

  <form id="resetForm">
    <label for="email">Email Address</label>
    <input
      type="email"
      id="email"
      name="email"
      required
      placeholder="name@company.com"
    >

    <button type="submit" id="submitBtn">
      Send Reset Link
    </button>
  </form>

  <div id="successBox" class="success">
    Check your email for password reset instructions.
  </div>

  <div id="errorBox" class="error-box"></div>

  <a href="auth.html?mode=login" class="back-link">
    ← Back to Sign In
  </a>

</div>

<script>
document.getElementById('resetForm').addEventListener('submit', async function(e){
  e.preventDefault();
  
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submitBtn');
  const successBox = document.getElementById('successBox');
  const errorBox = document.getElementById('errorBox');
  
  // Reset visibility states
  successBox.style.display = 'none';
  errorBox.style.display = 'none';
  
  // Enable UI loading layout states
  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending...';
  
  try {
    const response = await fetch('https://wissely-worker.thilinarashmika0727.workers.dev/forgot-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        email: emailInput.value.trim()
      })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      successBox.style.display = 'block';
      this.reset(); // Clear form inputs on clean return completion
    } else {
      errorBox.textContent = data.error || 'An unexpected runtime anomaly occurred.';
      errorBox.style.display = 'block';
    }
  } catch (err) {
    errorBox.textContent = 'Unable to establish server synchronization. Please verify connectivity.';
    errorBox.style.display = 'block';
  } finally {
    // Restore primary element configurations
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send Reset Link';
  }
});
</script>

</body>
</html>
