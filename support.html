<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Support · Wissely</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0c0c0a; --ink2:#1a1a14; --sage:#2d4a3e; --sage2:#3d6b58;
  --gold:#c9a84c; --gold2:#e8c97a; --cream:#f8f6f0; --cream2:#ede9df; --cream3:#dedad0;
  --text:#2a2a20; --muted:#6b6b55; --white:#fefefc; --danger:#b3432f;
}
body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
a{color:inherit}

.wrap{max-width:820px;margin:0 auto;padding:56px 24px 96px}
.eyebrow{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:3px;text-transform:uppercase;color:var(--sage);font-weight:600;margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,4vw,42px);font-weight:600;letter-spacing:-1px;color:var(--ink);margin-bottom:10px}
.sub{font-size:14px;color:var(--muted);line-height:1.75;max-width:560px;margin-bottom:20px}

.priority-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.35);border-radius:100px;padding:6px 16px;font-size:12px;color:#8a6d1f;font-weight:600;margin-bottom:28px}
.priority-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
.normal-note{font-size:12.5px;color:var(--muted);margin-bottom:28px}

.card{background:var(--white);border:1px solid var(--cream3);border-radius:16px;padding:28px;margin-bottom:24px}
.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink);margin-bottom:4px}
.card-desc{font-size:12.5px;color:var(--muted);margin-bottom:18px}

label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;margin-top:16px}
label:first-of-type{margin-top:0}
input, textarea{width:100%;padding:11px 14px;border:1px solid var(--cream3);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream);resize:vertical}
input:focus, textarea:focus{outline:2px solid var(--sage);outline-offset:1px}
textarea{min-height:140px;line-height:1.6}
.char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:4px}

.btn{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--white);padding:11px 24px;border-radius:100px;font-size:13px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:background 0.15s;margin-top:20px}
.btn:hover{background:var(--sage)}
.btn:disabled{opacity:0.5;cursor:not-allowed}

.ticket-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid var(--cream2)}
.ticket-row:last-child{border-bottom:none}
.ticket-subject{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:3px}
.ticket-meta{font-size:11.5px;color:var(--muted);font-family:'DM Mono',monospace}
.ticket-badge{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:0.5px;padding:3px 10px;border-radius:100px;font-weight:600;text-transform:uppercase}
.ticket-badge.high{background:rgba(201,168,76,0.15);color:#8a6d1f}
.ticket-badge.normal{background:var(--cream2);color:var(--muted)}
.ticket-badge.status-open{border:1px solid var(--sage);color:var(--sage)}
.ticket-badge.status-closed{border:1px solid var(--cream3);color:var(--muted)}
.empty{font-size:13px;color:var(--muted);padding:12px 0}

.success-box{background:var(--sage);border-radius:12px;padding:20px;margin-top:16px;display:none}
.success-box.show{display:block}
.success-box p{color:var(--white);font-size:13px;line-height:1.6}
.success-box strong{color:var(--gold2)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);padding:12px 22px;border-radius:100px;font-size:13px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.toast.show{opacity:1}
.status-msg{font-size:13px;color:var(--muted);text-align:center;padding:24px}
.error-msg{color:var(--danger)}
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Help</div>
  <h1>Support</h1>
  <p class="sub">Have a question or ran into a problem? Send us a message and we'll get back to you.</p>

  <div id="planNote"></div>

  <div id="app">
    <p class="status-msg">Loading your account…</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = '';
const app = document.getElementById('app');
const planNote = document.getElementById('planNote');
const toastEl = document.getElementById('toast');
let isPro = false;
let isLoggedIn = false;

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2600);
}

function getCsrfToken() {
  return localStorage.getItem('wissely_csrf_token') || '';
}

async function apiFetch(path, options = {}) {
  let res;
  try {
    res = await fetch(`${API_BASE}${path}`, {
      ...options,
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': getCsrfToken(),
        ...(options.headers || {})
      }
    });
  } catch {
    toast('Network error. Please try again.');
    return null;
  }
  return res;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

async function init() {
  const meRes = await apiFetch('/me');
  if (meRes && meRes.ok) {
    const me = await meRes.json();
    isLoggedIn = true;
    isPro = me.user?.plan === 'pro';
  }
  // Not logged in is fine here - support accepts anonymous submissions
  // (e.g. someone locked out of their account). We just skip the /me step.

  planNote.innerHTML = isPro
    ? `<div class="priority-badge"><span class="dot"></span>Pro plan - priority support, response within 4 business hours</div>`
    : `<div class="normal-note">Typical response time: 1-2 business days. <a href="upgrade.html" style="color:var(--sage);font-weight:600;">Upgrade to Pro</a> for priority support with a 4-hour response window.</div>`;

  renderForm();
  if (isLoggedIn) await loadTickets();
}

function renderForm() {
  app.innerHTML = `
    <div class="card">
      <div class="card-title">Send a message</div>
      <div class="card-desc">Tell us what's going on - the more detail, the faster we can help.</div>

      ${isLoggedIn ? '' : `
        <label for="ticketEmail">Your email</label>
        <input id="ticketEmail" type="email" placeholder="you@company.com" />
      `}

      <label for="ticketSubject">Subject</label>
      <input id="ticketSubject" type="text" maxlength="150" placeholder="Briefly, what's this about?" />

      <label for="ticketMessage">Message</label>
      <textarea id="ticketMessage" maxlength="5000" placeholder="Describe the issue or question in detail..."></textarea>
      <div class="char-count" id="charCount">0 / 5000</div>

      <button class="btn" id="sendBtn">Send message</button>

      <div class="success-box" id="successBox">
        <p><strong>Message sent.</strong> We'll reply to your email ${isPro ? 'within 4 business hours' : 'within 1-2 business days'}. Check your inbox for a confirmation.</p>
      </div>
    </div>

    ${isLoggedIn ? `
      <div class="card">
        <div class="card-title">Your tickets</div>
        <div class="card-desc">Recent messages you've sent us.</div>
        <div id="ticketList"><p class="status-msg">Loading your tickets…</p></div>
      </div>
    ` : ''}
  `;

  const messageEl = document.getElementById('ticketMessage');
  const charCount = document.getElementById('charCount');
  messageEl.addEventListener('input', () => {
    charCount.textContent = `${messageEl.value.length} / 5000`;
  });

  document.getElementById('sendBtn').addEventListener('click', sendTicket);
}

async function sendTicket() {
  const btn = document.getElementById('sendBtn');
  if (btn.disabled) return; // guards against duplicate submits (e.g. key-repeat)

  const subjectEl = document.getElementById('ticketSubject');
  const messageEl = document.getElementById('ticketMessage');
  const emailEl = document.getElementById('ticketEmail'); // only present when logged out

  const subject = subjectEl.value.trim();
  const message = messageEl.value.trim();
  const email = emailEl ? emailEl.value.trim() : undefined;

  if (!subject) { toast('Please add a subject'); return; }
  if (message.length < 10) { toast('Please add a bit more detail (10+ characters)'); return; }
  if (emailEl && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Please enter a valid email'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const res = await apiFetch('/support/tickets', {
      method: 'POST',
      body: JSON.stringify({ subject, message, ...(emailEl ? { email } : {}) })
    });
    if (!res) return;
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Could not send your message'); return; }

    document.getElementById('successBox').classList.add('show');
    subjectEl.value = '';
    messageEl.value = '';
    document.getElementById('charCount').textContent = '0 / 5000';
    if (isLoggedIn) await loadTickets();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send message';
  }
}

async function loadTickets() {
  const listEl = document.getElementById('ticketList');
  if (!listEl) return;
  const res = await apiFetch('/support/tickets');
  if (!res) return;
  if (!res.ok) {
    listEl.innerHTML = '<p class="status-msg error-msg">Unable to load your tickets.</p>';
    return;
  }
  const { tickets } = await res.json();

  if (!tickets.length) {
    listEl.innerHTML = '<p class="empty">No tickets yet. Send a message above and it\'ll show up here.</p>';
    return;
  }

  listEl.innerHTML = tickets.map(t => `
    <div class="ticket-row">
      <div>
        <div class="ticket-subject">${escapeHtml(t.subject)}</div>
        <div class="ticket-meta">${fmtDate(t.created_at)}</div>
      </div>
      <div style="display:flex;gap:6px;">
        <span class="ticket-badge ${t.priority === 'high' ? 'high' : 'normal'}">${t.priority === 'high' ? 'Priority' : 'Standard'}</span>
        <span class="ticket-badge status-${t.status}">${escapeHtml(t.status)}</span>
      </div>
    </div>
  `).join('');
}

init();
</script>
</body>
</html>
