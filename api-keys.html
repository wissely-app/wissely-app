<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>API Keys · Wissely</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0c0c0a; --ink2:#1a1a14; --sage:#2d4a3e; --sage2:#3d6b58;
  --gold:#c9a84c; --gold2:#e8c97a; --cream:#f8f6f0; --cream2:#ede9df; --cream3:#dedad0;
  --text:#2a2a20; --muted:#6b6b55; --white:#fefefc; --danger:#b3432f;
}
body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
a{color:inherit}

.wrap{max-width:820px;margin:0 auto;padding:56px 24px 96px}
.eyebrow{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:3px;text-transform:uppercase;color:var(--sage);font-weight:600;margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,4vw,42px);font-weight:600;letter-spacing:-1px;color:var(--ink);margin-bottom:10px}
.sub{font-size:14px;color:var(--muted);line-height:1.75;max-width:560px;margin-bottom:36px}

.card{background:var(--white);border:1px solid var(--cream3);border-radius:16px;padding:28px;margin-bottom:24px}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink)}
.card-desc{font-size:12.5px;color:var(--muted);margin-top:4px}

.btn{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--white);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:background 0.15s}
.btn:hover{background:var(--sage)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--cream3);padding:7px 14px;font-size:12px}
.btn-ghost:hover{color:var(--danger);border-color:var(--danger)}

.upgrade-box{background:var(--ink);border-radius:16px;padding:32px;text-align:center}
.upgrade-box h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--white);margin-bottom:8px}
.upgrade-box p{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.7;max-width:420px;margin:0 auto 20px}

.key-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0;border-bottom:1px solid var(--cream2)}
.key-row:last-child{border-bottom:none}
.key-name{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px}
.key-meta{font-size:11.5px;color:var(--muted);font-family:'DM Mono',monospace}
.key-meta .revoked{color:var(--danger)}
.key-actions{display:flex;gap:8px;align-items:center}
.empty{font-size:13px;color:var(--muted);padding:12px 0}

.new-key-form{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.new-key-form input{flex:1;min-width:200px;padding:11px 14px;border:1px solid var(--cream3);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream)}
.new-key-form input:focus{outline:2px solid var(--sage);outline-offset:1px}
.form-note{font-size:11.5px;color:var(--muted)}

.reveal-box{background:var(--sage);border-radius:12px;padding:20px;margin-top:16px;display:none}
.reveal-box.show{display:block}
.reveal-label{font-size:10px;color:var(--gold2);font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.reveal-key{font-family:'DM Mono',monospace;font-size:13px;color:var(--white);background:rgba(0,0,0,0.2);padding:12px 14px;border-radius:8px;word-break:break-all;margin-bottom:10px}
.reveal-warn{font-size:12px;color:rgba(255,255,255,0.75);line-height:1.6}
.copy-btn{margin-top:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);padding:12px 22px;border-radius:100px;font-size:13px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.toast.show{opacity:1}

.status-msg{font-size:13px;color:var(--muted);text-align:center;padding:24px}
.error-msg{color:var(--danger)}
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Developer</div>
  <h1>API Keys</h1>
  <p class="sub">Use API keys to call the Wissely Analyze API directly from your own systems. API access is included with the Pro plan and counts against your regular monthly analysis quota.</p>

  <div id="app">
    <p class="status-msg">Loading your account…</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = '';
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2600);
}

function getCsrfToken() {
  // Set at login by the app's auth flow — see /login response `csrfToken`.
  return localStorage.getItem('wissely_csrf_token') || '';
}

async function apiFetch(path, options = {}) {
  let res;
  try {
    res = await fetch(`${API_BASE}${path}`, {
      ...options,
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': getCsrfToken(),
        ...(options.headers || {})
      }
    });
  } catch {
    toast('Network error. Please try again.');
    return null;
  }
  if (res.status === 401) {
    window.location.replace('auth.html?mode=login');
    return null;
  }
  return res;
}

function fmtDate(iso) {
  if (!iso) return 'Never';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function init() {
  const meRes = await apiFetch('/me');
  if (!meRes) return;
  if (!meRes.ok) {
    app.innerHTML = '<p class="status-msg error-msg">Unable to load your account. Please refresh the page.</p>';
    return;
  }
  const me = await meRes.json();

  // API keys are an owner-only capability. A team member's `plan` field
  // reads 'pro' too (shared-quota overlay), so this must check their own
  // actual plan and team status, not the overlaid value — otherwise a
  // member would see the create-key form only to have it rejected
  // server-side with a confusing error.
  if (me.user?.isTeamMember || (me.user?.ownPlan ?? me.user?.plan) !== 'pro') {
    renderUpgradePrompt();
    return;
  }

  renderKeyManager();
  await loadKeys();
}

function renderUpgradePrompt() {
  app.innerHTML = `
    <div class="upgrade-box">
      <h2>API Access is a Pro feature</h2>
      <p>Upgrade to the Pro plan to generate API keys and call the Wissely Analyze API directly from your own applications.</p>
      <a class="btn btn-gold" href="upgrade.html">Upgrade to Pro</a>
    </div>
  `;
}

function renderKeyManager() {
  app.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Create a new key</div>
          <div class="card-desc">Give it a name so you can recognize it later, e.g. "Production server".</div>
        </div>
      </div>
      <div class="new-key-form">
        <input id="newKeyName" type="text" maxlength="64" placeholder="Key name" />
        <button class="btn" id="createKeyBtn">Create key</button>
      </div>
      <div class="form-note">Up to 10 active keys. The full key is shown once — copy it somewhere safe.</div>
      <div class="reveal-box" id="revealBox">
        <div class="reveal-label">Your new API key — save it now</div>
        <div class="reveal-key" id="revealKeyText"></div>
        <div class="reveal-warn">This is the only time the full key will be shown. If you lose it, revoke it and create a new one.</div>
        <button class="btn btn-ghost copy-btn" id="copyKeyBtn" style="color:#fff;border-color:rgba(255,255,255,0.3)">Copy to clipboard</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Your API keys</div>
          <div class="card-desc">Requests using a revoked key are rejected immediately.</div>
        </div>
      </div>
      <div id="keyList"><p class="status-msg">Loading API keys…</p></div>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom:10px">Using your key</div>
      <div class="card-desc" style="margin-bottom:0">
        Send it as a Bearer token: <code style="background:var(--cream2);padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px">Authorization: Bearer wsk_live_...</code>
        &nbsp;to <code style="background:var(--cream2);padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px">POST ${API_BASE}/api/v1/analyze</code>
      </div>
    </div>
  `;

  document.getElementById('createKeyBtn').addEventListener('click', createKey);
  document.getElementById('newKeyName').addEventListener('keydown', e => {
    if (e.key === 'Enter') createKey();
  });
}

async function loadKeys() {
  const listEl = document.getElementById('keyList');
  const res = await apiFetch('/api/v1/keys');
  if (!res) return;
  if (!res.ok) {
    listEl.innerHTML = '<p class="status-msg error-msg">Unable to load your API keys.</p>';
    return;
  }
  const { keys } = await res.json();

  if (!keys.length) {
    listEl.innerHTML = '<p class="empty">No API keys yet.<br/>Create your first API key above to start using the Wissely API.</p>';
    return;
  }

  listEl.innerHTML = keys.map(k => `
    <div class="key-row" data-id="${k.id}">
      <div>
        <div class="key-name">${escapeHtml(k.name)}</div>
        <div class="key-meta">
          ${escapeHtml(k.key_prefix)}… · Created ${fmtDate(k.created_at)} · Last used ${fmtDate(k.last_used_at)}
          ${k.revoked_at ? '<span class="revoked"> · Revoked</span>' : ''}
        </div>
      </div>
      <div class="key-actions">
        ${k.revoked_at ? '' : `
          <button class="btn-ghost btn rename-btn">Rename</button>
          <button class="btn-ghost btn revoke-btn">Revoke</button>
        `}
      </div>
    </div>
  `).join('');

  listEl.querySelectorAll('.rename-btn').forEach(btn => {
    btn.addEventListener('click', () => renameKey(btn.closest('.key-row').dataset.id, btn));
  });
  listEl.querySelectorAll('.revoke-btn').forEach(btn => {
    btn.addEventListener('click', () => revokeKey(btn.closest('.key-row').dataset.id, btn));
  });
}

async function createKey() {
  const input = document.getElementById('newKeyName');
  const btn = document.getElementById('createKeyBtn');
  if (btn.disabled) return; // already in flight — guards against Enter key-repeat firing duplicate requests

  const name = input.value.trim();
  if (!name) { toast('Give your key a name first'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating...';
  try {
    const res = await apiFetch('/api/v1/keys', {
      method: 'POST',
      body: JSON.stringify({ name })
    });
    if (!res) return;
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Could not create key'); return; }

    const box = document.getElementById('revealBox');
    document.getElementById('revealKeyText').textContent = data.key;
    box.classList.add('show');
    document.getElementById('copyKeyBtn').onclick = async () => {
      try {
        await navigator.clipboard.writeText(data.key);
        toast('Copied to clipboard');
      } catch {
        toast('Copy failed');
      }
    };

    input.value = '';
    await loadKeys();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create key';
    input.focus();
  }
}

async function renameKey(id, btn) {
  const name = prompt('New name for this key:');
  if (!name || !name.trim()) return;

  if (btn) btn.disabled = true;
  try {
    const res = await apiFetch(`/api/v1/keys/${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ name: name.trim() })
    });
    if (!res) return;
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Could not rename key'); return; }
    toast('Key renamed');
    await loadKeys();
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function revokeKey(id, btn) {
  if (!confirm('Revoke this API key? Any application using it will stop working immediately.')) return;

  if (btn) btn.disabled = true;
  try {
    const res = await apiFetch(`/api/v1/keys/${id}`, { method: 'DELETE' });
    if (!res) return;
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Could not revoke key'); return; }
    toast('Key revoked');
    await loadKeys();
  } finally {
    if (btn) btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
