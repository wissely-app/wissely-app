<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team · Wissely</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0c0c0a; --ink2:#1a1a14; --sage:#2d4a3e; --sage2:#3d6b58;
  --gold:#c9a84c; --gold2:#e8c97a; --cream:#f8f6f0; --cream2:#ede9df; --cream3:#dedad0;
  --text:#2a2a20; --muted:#6b6b55; --white:#fefefc; --danger:#b3432f;
}
body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
a{color:inherit}

.wrap{max-width:820px;margin:0 auto;padding:56px 24px 96px}
.eyebrow{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:3px;text-transform:uppercase;color:var(--sage);font-weight:600;margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,4vw,42px);font-weight:600;letter-spacing:-1px;color:var(--ink);margin-bottom:10px}
.sub{font-size:14px;color:var(--muted);line-height:1.75;max-width:560px;margin-bottom:28px}

.card{background:var(--white);border:1px solid var(--cream3);border-radius:16px;padding:28px;margin-bottom:24px}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink)}
.card-desc{font-size:12.5px;color:var(--muted);margin-top:4px}
.seat-count{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;background:var(--cream2);padding:5px 12px;border-radius:100px}

.btn{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--white);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:background 0.15s}
.btn:hover{background:var(--sage)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--cream3);padding:7px 14px;font-size:12px}
.btn-ghost:hover{color:var(--danger);border-color:var(--danger)}

.invite-form{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.invite-form input{flex:1;min-width:220px;padding:11px 14px;border:1px solid var(--cream3);border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--cream)}
.invite-form input:focus{outline:2px solid var(--sage);outline-offset:1px}

.member-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0;border-bottom:1px solid var(--cream2)}
.member-row:last-child{border-bottom:none}
.member-email{font-size:13.5px;font-weight:600;color:var(--ink)}
.member-meta{font-size:11.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.badge{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:0.5px;padding:3px 10px;border-radius:100px;font-weight:600;text-transform:uppercase;background:var(--cream2);color:var(--muted)}
.badge.pending{background:rgba(201,168,76,0.15);color:#8a6d1f}

.empty{font-size:13px;color:var(--muted);padding:12px 0}
.upgrade-box{background:var(--ink);border-radius:16px;padding:32px;text-align:center}
.upgrade-box h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--white);margin-bottom:8px}
.upgrade-box p{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.7;max-width:420px;margin:0 auto 20px}

.member-view-box{background:var(--sage);border-radius:16px;padding:28px}
.member-view-box h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--white);margin-bottom:8px}
.member-view-box p{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.7}

.accept-box{background:var(--white);border:1px solid var(--cream3);border-radius:16px;padding:32px;text-align:center}
.accept-box h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ink);margin-bottom:10px}
.accept-box p{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:20px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);padding:12px 22px;border-radius:100px;font-size:13px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.toast.show{opacity:1}
.status-msg{font-size:13px;color:var(--muted);text-align:center;padding:24px}
.error-msg{color:var(--danger)}
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Team</div>
  <h1>Team Seats</h1>
  <p class="sub">Share your Pro plan's analyses with your team. Up to 10 seats total, including you.</p>

  <div id="app">
    <p class="status-msg">Loading your account…</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = '';
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2600);
}

function getCsrfToken() {
  return localStorage.getItem('wissely_csrf_token') || '';
}

async function apiFetch(path, options = {}) {
  let res;
  try {
    res = await fetch(`${API_BASE}${path}`, {
      ...options,
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': getCsrfToken(),
        ...(options.headers || {})
      }
    });
  } catch {
    toast('Network error. Please try again.');
    return null;
  }
  if (res.status === 401) {
    window.location.replace(`auth.html?mode=login&next=${encodeURIComponent(window.location.pathname + window.location.search)}`);
    return null;
  }
  return res;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

async function init() {
  const inviteToken = new URLSearchParams(window.location.search).get('invite');

  const meRes = await apiFetch('/me');
  if (!meRes) return;
  if (!meRes.ok) {
    app.innerHTML = '<p class="status-msg error-msg">Unable to load your account. Please refresh the page.</p>';
    return;
  }
  const me = await meRes.json();

  // An invite link takes priority over the normal owner/member view - the
  // person clicking it wants to accept, regardless of their current state.
  if (inviteToken) {
    renderAcceptInvite(inviteToken, me.user);
    return;
  }

  if (me.user?.isTeamMember) {
    renderMemberView();
    return;
  }

  if (me.user?.ownPlan !== 'pro') {
    renderUpgradePrompt();
    return;
  }

  renderOwnerView();
  await loadMembers();
}

function renderAcceptInvite(token, user) {
  app.innerHTML = `
    <div class="accept-box">
      <h2>Join this team?</h2>
      <p>You've been invited to share a Pro team's analyses. Accepting will link your account (${escapeHtml(user?.email || '')}) to their team.</p>
      <button class="btn btn-gold" id="acceptBtn">Accept invitation</button>
    </div>
  `;
  document.getElementById('acceptBtn').addEventListener('click', async () => {
    const btn = document.getElementById('acceptBtn');
    if (btn.disabled) return;
    btn.disabled = true;
    btn.textContent = 'Joining...';
    try {
      const res = await apiFetch('/team/invites/accept', {
        method: 'POST',
        body: JSON.stringify({ token })
      });
      if (!res) return;
      const data = await res.json();
      if (!res.ok) { toast(data.error || 'Could not accept invitation'); btn.disabled = false; btn.textContent = 'Accept invitation'; return; }
      toast('Welcome to the team!');
      window.location.replace('team.html');
    } catch {
      btn.disabled = false;
      btn.textContent = 'Accept invitation';
    }
  });
}

function renderMemberView() {
  app.innerHTML = `
    <div class="member-view-box">
      <h2>You're on a team</h2>
      <p>Your analyses are shared with a team owner's Pro plan. You don't have your own API keys or billing on this team - those stay with the owner.</p>
    </div>
  `;
}

function renderUpgradePrompt() {
  app.innerHTML = `
    <div class="upgrade-box">
      <h2>Team Seats is a Pro feature</h2>
      <p>Upgrade to the Pro plan to invite up to 9 teammates to share your analyses.</p>
      <a class="btn btn-gold" href="upgrade.html">Upgrade to Pro</a>
    </div>
  `;
}

function renderOwnerView() {
  app.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Invite a teammate</div>
          <div class="card-desc">They'll get an email with a link to join.</div>
        </div>
        <span class="seat-count" id="seatCount">— / 10 seats</span>
      </div>
      <div class="invite-form">
        <input id="inviteEmail" type="email" placeholder="teammate@company.com" />
        <button class="btn" id="inviteBtn">Send invite</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Team members</div>
      <div id="memberList"><p class="status-msg">Loading team…</p></div>
    </div>
  `;

  document.getElementById('inviteBtn').addEventListener('click', sendInvite);
  document.getElementById('inviteEmail').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendInvite();
  });
}

async function sendInvite() {
  const btn = document.getElementById('inviteBtn');
  if (btn.disabled) return;

  const input = document.getElementById('inviteEmail');
  const email = input.value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { toast('Please enter a valid email'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  try {
    const res = await apiFetch('/team/invites', {
      method: 'POST',
      body: JSON.stringify({ email })
    });
    if (!res) return;
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Could not send invite'); return; }
    toast('Invite sent');
    input.value = '';
    await loadMembers();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send invite';
    input.focus();
  }
}

async function loadMembers() {
  const listEl = document.getElementById('memberList');
  const res = await apiFetch('/team/members');
  if (!res) return;
  if (!res.ok) {
    listEl.innerHTML = '<p class="status-msg error-msg">Unable to load your team.</p>';
    return;
  }
  const { members, invites, seatLimit } = await res.json();

  const seatCountEl = document.getElementById('seatCount');
  if (seatCountEl) seatCountEl.textContent = `${1 + members.length + invites.length} / ${seatLimit || 10} seats`;

  const rows = [
    ...members.map(m => ({ type: 'member', id: m.id, email: m.email })),
    ...invites.map(i => ({ type: 'invite', id: i.id, email: i.email, expires_at: i.expires_at }))
  ];

  if (!rows.length) {
    listEl.innerHTML = '<p class="empty">Just you so far. Invite a teammate above.</p>';
    return;
  }

  listEl.innerHTML = rows.map(r => `
    <div class="member-row" data-id="${r.id}" data-type="${r.type}">
      <div>
        <div class="member-email">${escapeHtml(r.email)}</div>
        <div class="member-meta">${r.type === 'invite' ? `Invited · expires ${fmtDate(r.expires_at)}` : 'Active member'}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="badge ${r.type === 'invite' ? 'pending' : ''}">${r.type === 'invite' ? 'Pending' : 'Member'}</span>
        ${r.type === 'member' ? '<button class="btn-ghost btn remove-btn">Remove</button>' : ''}
      </div>
    </div>
  `).join('');

  listEl.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => removeMember(btn.closest('.member-row').dataset.id, btn));
  });
}

async function removeMember(id, btn) {
  if (!confirm('Remove this person from your team? They will lose access to shared analyses immediately.')) return;
  if (btn) btn.disabled = true;
  try {
    const res = await apiFetch(`/team/members/${id}`, { method: 'DELETE' });
    if (!res) return;
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Could not remove member'); return; }
    toast('Member removed');
    await loadMembers();
  } finally {
    if (btn) btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
