<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful | Wissely</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #0c0c0a;
  --sage: #2d4a3e;
  --sage-muted: #4a6b5d;
  --gold: #c9a84c;
  --gold-dark: #b0913b;
  --gold-light: #f4ebd0;
  --cream: #fbfaf7;
  --cream-card: #ffffff;
  --cream3: #e8e5dc;
  --text: #2a2a20;
  --text-muted: #6b6b5b;
  --success-bg: #f0fdf4;
  --success-border: #dcfce7;
  --success-text: #16a34a;
  --shadow: 0 20px 40px -15px rgba(45, 74, 62, 0.07), 0 1px 3px rgba(0, 0, 0, 0.02);
  --transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.card {
  background: var(--cream-card);
  border: 1px solid var(--cream3);
  border-radius: 24px;
  padding: 56px 48px;
  max-width: 520px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--cream3), var(--gold), var(--cream3));
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--sage);
  letter-spacing: -0.5px;
  margin-bottom: 40px;
  display: inline-block;
  text-decoration: none;
}

.icon-container {
  width: 80px;
  height: 80px;
  background: var(--success-bg);
  border: 1px solid var(--success-border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
}

.icon {
  font-size: 24px;
  font-weight: 600;
  color: var(--success-text);
  line-height: 1;
  user-select: none;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 700;
  color: var(--sage);
  line-height: 1.2;
  margin-bottom: 16px;
}

.subtitle {
  color: var(--text-muted);
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 36px;
  font-weight: 400;
}

.info-box {
  background: var(--cream);
  border: 1px solid var(--cream3);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 36px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  font-size: 15px;
}

.info-row:not(:last-child) {
  border-bottom: 1px solid var(--cream3);
}

.info-label {
  color: var(--text-muted);
  font-weight: 500;
}

.status {
  color: var(--success-text);
  font-weight: 600;
  background: var(--success-bg);
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 13px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border: 1px solid var(--success-border);
}

.plan {
  color: var(--sage);
  font-weight: 600;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 18px 24px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.3px;
  transition: var(--transition);
  cursor: pointer;
  background: linear-gradient(135deg, #c9a84c, #a8873c);
  color: #0c0c0a;
  border: 1px solid #b0913b;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(201, 168, 76, 0.2);
  opacity: 0.95;
}

.btn:active {
  transform: translateY(0);
}

/* Pending / error banner — hidden until needed */
.status-banner {
  display: none;
  padding: 16px 20px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
  text-align: center;
  margin-bottom: 20px;
}

.status-banner.pending {
  background: #fffbeb;
  border: 1px solid #fde68a;
  color: #92400e;
}

.status-banner.error {
  background: #fff5f5;
  border: 1px solid #fecaca;
  color: #b91c1c;
}

/* Secondary retry button — hidden until needed */
.btn-retry {
  display: none;
  width: 100%;
  margin-top: 12px;
  padding: 16px 24px;
  border-radius: 14px;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.3px;
  cursor: pointer;
  background: transparent;
  color: var(--sage);
  border: 1px solid var(--cream3);
  transition: var(--transition);
  font-family: 'DM Sans', sans-serif;
}

.btn-retry:hover {
  border-color: var(--sage-muted);
  background: var(--cream);
}

.footer {
  margin-top: 40px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
  font-weight: 500;
  opacity: 0.8;
}

@media (max-width: 576px) {
  body {
    padding: 16px;
  }
  
  .card {
    padding: 40px 24px;
    border-radius: 20px;
  }

  h1 {
    font-size: 32px;
  }

  .logo {
    margin-bottom: 32px;
  }

  .icon-container {
    width: 72px;
    height: 72px;
    margin-bottom: 24px;
  }

  .icon {
    font-size: 20px;
  }

  .subtitle {
    font-size: 15px;
    margin-bottom: 28px;
  }

  .info-box {
    padding: 16px 20px;
    margin-bottom: 28px;
  }

  .btn {
    padding: 16px 20px;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="card">

  <a href="index.html" class="logo">Wissely</a>

  <div class="icon-container" aria-hidden="true">
    <div class="icon">✓</div>
  </div>

  <h1>Payment Successful</h1>

  <p class="subtitle" id="subtitle">
    Your subscription has been activated successfully. You can now access your upgraded workspace.
  </p>

  <div class="info-box">
    <div class="info-row">
      <span class="info-label">Status</span>
      <span class="status" id="statusBadge">Active</span>
    </div>
    <div class="info-row">
      <span class="info-label">Plan</span>
      <span class="plan" id="planName" aria-live="polite">Verifying…</span>
    </div>
  </div>

  <!-- Shown when Paddle webhook has not yet updated the database -->
  <div class="status-banner pending" id="pendingBanner"></div>

  <!-- Shown on network error -->
  <div class="status-banner error" id="errorBanner"></div>

  <a href="index.html" class="btn" id="workspaceBtn">
    Return to Workspace
  </a>

  <!-- Shown after timeout or on error so the user can trigger a fresh check -->
  <button class="btn-retry" id="retryBtn" type="button">Check Again</button>

</div>

<div class="footer">
  WISSELY.COM · YOUR FINANCES, FINALLY CLEAR
</div>

<script>
(function () {
  'use strict';

  // ── Configuration ───────────────────────────────────────────────────────────

  const API_BASE = 'https://wissely-worker.thilinarashmika0727.workers.dev';

  // Worker /me returns exactly: { authenticated, user: { id, email, plan,
  // analyses_used, analyses_limit, trial_end } }. There is no subscription_status,
  // isPaid, or active flag in the response — those DB columns exist but are not
  // included in userPayload. user.plan is therefore the only field available to
  // detect subscription state, and a set comparison is the correct approach.
  //
  // Possible user.plan values (from worker.js):
  //   'trial'   — 14-day trial, not yet paid
  //   'free'    — no subscription (post-trial or cancelled)
  //   'starter' — paid Starter plan  ($12/mo, 50 analyses)
  //   'growth'  — paid Growth plan   ($29/mo, 250 analyses)
  //   'pro'     — paid Pro plan      ($79/mo, 1000 analyses)
  //
  // Polling stops as soon as plan enters this set — meaning the Paddle
  // subscription.created / transaction.completed webhook has updated the DB.
  const PAID_PLANS = new Set(['starter', 'growth', 'pro']);

  // Display labels for each paid plan.
  const PLAN_LABELS = {
    starter: 'Starter',
    growth:  'Growth',
    pro:     'Pro'
  };

  // Polling parameters — poll every 2.5 s for up to 30 s.
  const POLL_INTERVAL_MS = 2500;
  const POLL_MAX_ATTEMPTS = 12; // 12 × 2.5 s ≈ 30 s

  // ── DOM references ──────────────────────────────────────────────────────────

  const elPlanName      = document.getElementById('planName');
  const elStatusBadge   = document.getElementById('statusBadge');
  const elSubtitle      = document.getElementById('subtitle');
  const elPendingBanner = document.getElementById('pendingBanner');
  const elErrorBanner   = document.getElementById('errorBanner');
  const elWorkspaceBtn  = document.getElementById('workspaceBtn');
  const elRetryBtn      = document.getElementById('retryBtn');

  // ── UI state helpers ────────────────────────────────────────────────────────

  function showSuccess(planKey) {
    const label = PLAN_LABELS[planKey] || planKey;

    elPlanName.textContent = label;
    elStatusBadge.textContent = 'Active';

    elSubtitle.textContent =
      'Your subscription has been activated successfully. ' +
      'You can now access your upgraded workspace.';

    hideBanner(elPendingBanner);
    hideBanner(elErrorBanner);
    elWorkspaceBtn.style.display = 'flex';
    elRetryBtn.style.display = 'none';
  }

  function showPending(attemptsLeft) {
    elPlanName.textContent = 'Activating…';
    elStatusBadge.textContent = 'Processing';

    elSubtitle.textContent =
      'Your payment was received and is being confirmed.';

    showBanner(elPendingBanner,
      'We\'re waiting for payment confirmation — this usually takes just a few seconds. ' +
      'Please keep this page open.'
    );
    hideBanner(elErrorBanner);

    // Hide the workspace link until activation is confirmed
    elWorkspaceBtn.style.display = 'none';
    elRetryBtn.style.display = 'none';
  }

  function showTimeout() {
    elPlanName.textContent = 'Pending';
    elStatusBadge.textContent = 'Processing';

    elSubtitle.textContent = 'Your payment is being processed.';

    showBanner(elPendingBanner,
      'Your payment has been received, but activation is taking longer than expected. ' +
      'This can happen during high traffic. Your plan will activate shortly — ' +
      'you can check again below or return in a few minutes.'
    );
    hideBanner(elErrorBanner);

    elWorkspaceBtn.style.display = 'none';
    elRetryBtn.style.display = 'block';
  }

  function showNetworkError() {
    showBanner(elErrorBanner,
      'Unable to reach Wissely right now. Please check your connection and try again.'
    );
    hideBanner(elPendingBanner);
    elWorkspaceBtn.style.display = 'none';
    elRetryBtn.style.display = 'block';
  }

  function showBanner(el, message) {
    el.textContent = message;
    el.style.display = 'block';
  }

  function hideBanner(el) {
    el.style.display = 'none';
    el.textContent = '';
  }

  // ── Core: fetch /me and return the parsed user object ───────────────────────
  // Worker response envelope: { authenticated: true, user: { id, email, plan,
  // analyses_used, analyses_limit, trial_end } }
  // 401 → session missing/expired; 403 → trial expired (trialExpired: true).
  // Throws { status } on auth failure, { networkError: true } on network/parse error.

  async function fetchMe() {
    let res;
    try {
      res = await fetch(`${API_BASE}/me`, {
        method: 'GET',
        credentials: 'include',
        cache: 'no-store'
      });
    } catch {
      // Network failure (offline, DNS, etc.)
      throw { networkError: true };
    }

    // Auth failures — caller handles redirects
    if (res.status === 401 || res.status === 403) {
      throw { status: res.status };
    }

    let data;
    try {
      data = await res.json();
    } catch {
      throw { networkError: true };
    }

    if (!data?.user) {
      throw { networkError: true };
    }

    return data.user;
  }

  // ── Polling loop ────────────────────────────────────────────────────────────
  // Calls /me up to POLL_MAX_ATTEMPTS times, waiting POLL_INTERVAL_MS between
  // each attempt. Checks user.plan — the only subscription field /me returns —
  // against PAID_PLANS. Stops immediately when the Paddle webhook has fired and
  // the DB reflects the new plan. Redirects on auth errors; surfaces network
  // failures with a retry prompt.

  let pollTimer = null;

  function startPolling() {
    let attempts = 0;

    async function poll() {
      attempts++;

      try {
        const user = await fetchMe();
        const plan = (user.plan || '').toLowerCase();

        if (PAID_PLANS.has(plan)) {
          // Subscription confirmed by the backend — show success and stop.
          showSuccess(plan);
          return;
        }

        // Webhook has not yet updated the DB.
        if (attempts < POLL_MAX_ATTEMPTS) {
          showPending(POLL_MAX_ATTEMPTS - attempts);
          pollTimer = setTimeout(poll, POLL_INTERVAL_MS);
        } else {
          // Exhausted all retries — show the human-readable timeout message.
          showTimeout();
        }

      } catch (err) {
        if (err.status === 401) {
          // Session expired during polling — send back to login.
          window.location.replace('login.html');
          return;
        }
        if (err.status === 403) {
          // Trial/access issue — send to upgrade page.
          window.location.replace('upgrade.html');
          return;
        }
        // Network or parse failure — show error and let the user retry.
        showNetworkError();
      }
    }

    poll();
  }

  // ── Retry button ────────────────────────────────────────────────────────────
  // Resets state and starts a fresh polling cycle, giving the user another
  // 30-second window to wait for webhook delivery.

  elRetryBtn.addEventListener('click', function () {
    if (pollTimer) {
      clearTimeout(pollTimer);
      pollTimer = null;
    }
    hideBanner(elPendingBanner);
    hideBanner(elErrorBanner);
    elRetryBtn.style.display = 'none';
    elPlanName.textContent = 'Verifying…';
    startPolling();
  });

  // ── Entry point ─────────────────────────────────────────────────────────────
  // Begin polling as soon as the page loads. The first call to /me also acts
  // as the authentication check — no separate auth preflight is needed.

  startPolling();

  // ── Cleanup on page exit ─────────────────────────────────────────────────────
  // Cancel any pending poll timer when the user navigates away or refreshes,
  // so no orphaned callbacks fire against a stale document context.

  window.addEventListener('beforeunload', function () {
    if (pollTimer) {
      clearTimeout(pollTimer);
    }
  });

})();
</script>

</body>
</html>
