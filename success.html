<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful | Wissely</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #0c0c0a;
  --sage: #2d4a3e;
  --sage-muted: #4a6b5d;
  --gold: #c9a84c;
  --gold-dark: #b0913b;
  --gold-light: #f4ebd0;
  --cream: #fbfaf7;
  --cream-card: #ffffff;
  --cream3: #e8e5dc;
  --text: #2a2a20;
  --text-muted: #6b6b5b;
  --success-bg: #f0fdf4;
  --success-border: #dcfce7;
  --success-text: #16a34a;
  --shadow: 0 20px 40px -15px rgba(45, 74, 62, 0.07), 0 1px 3px rgba(0, 0, 0, 0.02);
  --transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.card {
  background: var(--cream-card);
  border: 1px solid var(--cream3);
  border-radius: 24px;
  padding: 56px 48px;
  max-width: 520px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--cream3), var(--gold), var(--cream3));
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--sage);
  letter-spacing: -0.5px;
  margin-bottom: 40px;
  display: inline-block;
  text-decoration: none;
}

.icon-container {
  width: 80px;
  height: 80px;
  background: var(--success-bg);
  border: 1px solid var(--success-border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
}

.icon {
  font-size: 24px;
  font-weight: 600;
  color: var(--success-text);
  line-height: 1;
  user-select: none;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 38px;
  font-weight: 700;
  color: var(--sage);
  line-height: 1.2;
  margin-bottom: 16px;
}

.subtitle {
  color: var(--text-muted);
  font-size: 16px;
  line-height: 1.6;
  margin-bottom: 36px;
  font-weight: 400;
}

.info-box {
  background: var(--cream);
  border: 1px solid var(--cream3);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 36px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  font-size: 15px;
}

.info-row:not(:last-child) {
  border-bottom: 1px solid var(--cream3);
}

.info-label {
  color: var(--text-muted);
  font-weight: 500;
}

.status {
  color: var(--success-text);
  font-weight: 600;
  background: var(--success-bg);
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 13px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border: 1px solid var(--success-border);
}

.plan {
  color: var(--sage);
  font-weight: 600;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 18px 24px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.3px;
  transition: var(--transition);
  cursor: pointer;
  background: linear-gradient(135deg, #c9a84c, #a8873c);
  color: #0c0c0a;
  border: 1px solid #b0913b;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(201, 168, 76, 0.2);
  opacity: 0.95;
}

.btn:active {
  transform: translateY(0);
}

.footer {
  margin-top: 40px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
  font-weight: 500;
  opacity: 0.8;
}

@media (max-width: 576px) {
  body {
    padding: 16px;
  }
  
  .card {
    padding: 40px 24px;
    border-radius: 20px;
  }

  h1 {
    font-size: 32px;
  }

  .logo {
    margin-bottom: 32px;
  }

  .icon-container {
    width: 72px;
    height: 72px;
    margin-bottom: 24px;
  }

  .icon {
    font-size: 20px;
  }

  .subtitle {
    font-size: 15px;
    margin-bottom: 28px;
  }

  .info-box {
    padding: 16px 20px;
    margin-bottom: 28px;
  }

  .btn {
    padding: 16px 20px;
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="card">

  <a href="index.html" class="logo">Wissely</a>

  <div class="icon-container" aria-hidden="true">
    <div class="icon">✓</div>
  </div>

  <h1>Payment Successful</h1>

  <p class="subtitle">
    Your subscription has been activated successfully. You can now access your upgraded workspace.
  </p>

  <div class="info-box">
    <div class="info-row">
      <span class="info-label">Status</span>
      <span class="status">Active</span>
    </div>
    <div class="info-row">
      <span class="info-label">Plan</span>
      <span class="plan" id="planName" aria-live="polite">Loading...</span>
    </div>
  </div>

  <a href="index.html" class="btn">
    Return to Workspace
  </a>

</div>

<div class="footer">
  WISSELY.COM · YOUR FINANCES, FINALLY CLEAR
</div>

<script>
  (function() {
    // Standard structured plans lookup mapping table
    const plans = {
      starter: 'Starter',
      growth: 'Growth',
      pro: 'Pro'
    };

    // Client-side extraction via URL params for seamless migration to server injection points later
    const params = new URLSearchParams(window.location.search);
    const planParam = params.get('plan');
    
    const cleanPlan = planParam ? planParam.trim().toLowerCase() : 'starter';
    
    // Explicit map fallback handling to completely prevent parameter XSS injections or dynamic empty states
    document.getElementById('planName').textContent = plans[cleanPlan] || plans['starter'];
  })();
</script>

</body>
</html>
