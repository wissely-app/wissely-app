<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Webhooks · Wissely</title>
<meta name="robots" content="noindex, nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0c0c0a; --ink2:#1a1a14; --sage:#2d4a3e; --sage2:#3d6b58;
  --gold:#c9a84c; --gold2:#e8c97a; --cream:#f8f6f0; --cream2:#ede9df; --cream3:#dedad0;
  --text:#2a2a20; --muted:#6b6b55; --white:#fefefc; --danger:#b3432f;
}
body{background:var(--cream);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
a{color:inherit}

.wrap{max-width:820px;margin:0 auto;padding:56px 24px 96px}
.eyebrow{font-size:11px;font-family:'DM Mono',monospace;letter-spacing:3px;text-transform:uppercase;color:var(--sage);font-weight:600;margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,4vw,42px);font-weight:600;letter-spacing:-1px;color:var(--ink);margin-bottom:10px}
.sub{font-size:14px;color:var(--muted);line-height:1.75;max-width:560px;margin-bottom:36px}

.card{background:var(--white);border:1px solid var(--cream3);border-radius:16px;padding:28px;margin-bottom:24px}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--ink)}
.card-desc{font-size:12.5px;color:var(--muted);margin-top:4px}

.btn{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--white);padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;border:none;cursor:pointer;text-decoration:none;transition:background 0.15s}
.btn:hover{background:var(--sage)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--cream3);padding:7px 14px;font-size:12px}
.btn-ghost:hover{color:var(--danger);border-color:var(--danger)}

.upgrade-box{background:var(--ink);border-radius:16px;padding:32px;text-align:center}
.upgrade-box h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--white);margin-bottom:8px}
.upgrade-box p{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.7;max-width:420px;margin:0 auto 20px}

.member-view-box{background:var(--sage);border-radius:16px;padding:28px;text-align:center}
.member-view-box h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--white);margin-bottom:8px}
.member-view-box p{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.7}

.new-form{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.new-form input{flex:1;min-width:240px;padding:11px 14px;border:1px solid var(--cream3);border-radius:10px;font-size:13px;font-family:'DM Mono',monospace;background:var(--cream)}
.new-form input:focus{outline:2px solid var(--sage);outline-offset:1px}
.form-note{font-size:11.5px;color:var(--muted)}

.reveal-box{background:var(--sage);border-radius:12px;padding:20px;margin-top:16px;display:none}
.reveal-box.show{display:block}
.reveal-label{font-size:10px;color:var(--gold2);font-family:'DM Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.reveal-key{font-family:'DM Mono',monospace;font-size:13px;color:var(--white);background:rgba(0,0,0,0.2);padding:12px 14px;border-radius:8px;word-break:break-all;margin-bottom:10px}
.reveal-warn{font-size:12px;color:rgba(255,255,255,0.75);line-height:1.6}

.hook-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0;border-bottom:1px solid var(--cream2)}
.hook-row:last-child{border-bottom:none}
.hook-url{font-size:13px;font-weight:600;color:var(--ink);font-family:'DM Mono',monospace;word-break:break-all;margin-bottom:3px}
.hook-meta{font-size:11.5px;color:var(--muted);font-family:'DM Mono',monospace}
.hook-meta .status-success{color:var(--sage)}
.hook-meta .status-failed{color:var(--danger)}
.empty{font-size:13px;color:var(--muted);padding:12px 0}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--white);padding:12px 22px;border-radius:100px;font-size:13px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.toast.show{opacity:1}
.status-msg{font-size:13px;color:var(--muted);text-align:center;padding:24px}
.error-msg{color:var(--danger)}
code{background:var(--cream2);padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;font-size:12px}
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Developer</div>
  <h1>Webhooks</h1>
  <p class="sub">Get a signed POST request whenever one of your analyses completes - wire Wissely into your own backend, Zapier, or anything else that accepts a webhook.</p>

  <div id="app">
    <p class="status-msg">Loading your account…</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = '';
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');

function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2600);
}

function getCsrfToken() {
  return localStorage.getItem('wissely_csrf_token') || '';
}

async function apiFetch(path, options = {}) {
  let res;
  try {
    res = await fetch(`${API_BASE}${path}`, {
      ...options,
      credentials: 'include',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': getCsrfToken(),
        ...(options.headers || {})
      }
    });
  } catch {
    toast('Network error. Please try again.');
    return null;
  }
  if (res.status === 401) {
    window.location.replace('auth.html?mode=login');
    return null;
  }
  return res;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function fmtDate(iso) {
  if (!iso) return 'Never';
  return new Date(iso).toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

async function init() {
  const meRes = await apiFetch('/me');
  if (!meRes) return;
  if (!meRes.ok) {
    app.innerHTML = '<p class="status-msg error-msg">Unable to load your account. Please refresh the page.</p>';
    return;
  }
  const me = await meRes.json();

  // Owner-only, same as API Keys - a team member's overlaid plan reads
  // 'pro' too, so this checks their own actual plan and team status.
  if (me.user?.isTeamMember) {
    renderMemberView();
    return;
  }
  if ((me.user?.ownPlan ?? me.user?.plan) !== 'pro') {
    renderUpgradePrompt();
    return;
  }

  renderManager();
  await loadWebhooks();
}

function renderMemberView() {
  app.innerHTML = `
    <div class="member-view-box">
      <h2>Owner-only feature</h2>
      <p>Webhooks are managed by your team's owner. Ask them if you need an integration set up.</p>
    </div>
  `;
}

function renderUpgradePrompt() {
  app.innerHTML = `
    <div class="upgrade-box">
      <h2>Custom integrations are a Pro feature</h2>
      <p>Upgrade to the Pro plan to register webhook endpoints and connect Wissely to your own systems.</p>
      <a class="btn btn-gold" href="upgrade.html">Upgrade to Pro</a>
    </div>
  `;
}

function renderManager() {
  app.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">Add an endpoint</div>
          <div class="card-desc">Must be an https:// URL. Up to 5 active endpoints.</div>
        </div>
      </div>
      <div class="new-form">
        <input id="newUrl" type="url" placeholder="https://yourapp.com/webhooks/wissely" />
        <button class="btn" id="createBtn">Add endpoint</button>
      </div>
      <div class="form-note">You'll see the signing secret once, right after creating it.</div>
      <div class="reveal-box" id="revealBox">
        <div class="reveal-label">Signing secret - save it now</div>
        <div class="reveal-key" id="revealSecret"></div>
        <div class="reveal-warn">Use this to verify the <code style="background:rgba(0,0,0,0.2);color:#fff;">X-Wissely-Signature</code> header on each delivery. This is the only time it's shown - remove and re-add the endpoint if you lose it.</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Your endpoints</div>
      <div id="hookList"><p class="status-msg">Loading endpoints…</p></div>
    </div>

    <div class="card">
      <div class="card-title" style="margin-bottom:10px">How it works</div>
      <div class="card-desc" style="margin-bottom:0">
        On <code>analysis.completed</code>, we POST <code>{ event, data: { tool, report }, timestamp }</code> to your URL, signed with
        <code>X-Wissely-Signature: ts=&lt;unix&gt;; h1=&lt;hex&gt;</code> - an HMAC-SHA256 of <code>"&lt;ts&gt;:&lt;body&gt;"</code> using your secret.
      </div>
    </div>
  `;

  document.getElementById('createBtn').addEventListener('click', createWebhook);
  document.getElementById('newUrl').addEventListener('keydown', e => {
    if (e.key === 'Enter') createWebhook();
  });
}

async function createWebhook() {
  const btn = document.getElementById('createBtn');
  if (btn.disabled) return;

  const input = document.getElementById('newUrl');
  const url = input.value.trim();
  if (!url) { toast('Enter a URL first'); return; }

  btn.disabled = true;
  btn.textContent = 'Adding...';
  try {
    const res = await apiFetch('/webhooks', {
      method: 'POST',
      body: JSON.stringify({ url })
    });
    if (!res) return;
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Could not add endpoint'); return; }

    document.getElementById('revealSecret').textContent = data.secret;
    document.getElementById('revealBox').classList.add('show');
    input.value = '';
    await loadWebhooks();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add endpoint';
    input.focus();
  }
}

async function loadWebhooks() {
  const listEl = document.getElementById('hookList');
  const res = await apiFetch('/webhooks');
  if (!res) return;
  if (!res.ok) {
    listEl.innerHTML = '<p class="status-msg error-msg">Unable to load your endpoints.</p>';
    return;
  }
  const { webhooks } = await res.json();

  if (!webhooks.length) {
    listEl.innerHTML = '<p class="empty">No endpoints yet. Add one above to get started.</p>';
    return;
  }

  listEl.innerHTML = webhooks.map(w => `
    <div class="hook-row" data-id="${w.id}">
      <div>
        <div class="hook-url">${escapeHtml(w.url)}</div>
        <div class="hook-meta">
          Added ${fmtDate(w.created_at)} · Last delivery: ${w.last_delivery_at ? fmtDate(w.last_delivery_at) : 'Never'}
          ${w.last_delivery_status ? `· <span class="status-${w.last_delivery_status}">${escapeHtml(w.last_delivery_status)}</span>` : ''}
        </div>
      </div>
      <button class="btn-ghost btn remove-btn">Remove</button>
    </div>
  `).join('');

  listEl.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => removeWebhook(btn.closest('.hook-row').dataset.id, btn));
  });
}

async function removeWebhook(id, btn) {
  if (!confirm('Remove this webhook endpoint? It will stop receiving events immediately.')) return;
  if (btn) btn.disabled = true;
  try {
    const res = await apiFetch(`/webhooks/${id}`, { method: 'DELETE' });
    if (!res) return;
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Could not remove endpoint'); return; }
    toast('Endpoint removed');
    await loadWebhooks();
  } finally {
    if (btn) btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
