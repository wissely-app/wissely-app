<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wissely — Create New Password</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --sage:#2d4a3e;
  --gold:#c9a84c;
  --cream:#f8f6f0;
  --cream2:#ede9df;
  --cream3:#dedad0;
  --text:#2a2a20;
  --muted:#7a7a66;
  --white:#fefefc;
  --success:#16a34a;
  --error:#b91c1c;
}

body{
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  width:100%;
  max-width:520px;
  background:var(--white);
  border:1px solid var(--cream3);
  border-radius:24px;
  padding:40px;
  box-shadow:0 20px 50px rgba(0,0,0,.05);
}

.logo{
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:32px;
}

.logo-mark{
  width:36px;
  height:36px;
  border-radius:10px;
  background:var(--sage);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:700;
}

.logo-text{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  color:#111;
  font-weight:700;
}

h1{
  font-family:'Cormorant Garamond',serif;
  font-size:36px;
  margin-bottom:10px;
  color:var(--text);
}

.subtitle{
  color:var(--muted);
  line-height:1.6;
  margin-bottom:28px;
}

.form-group {
  margin-bottom: 20px;
}

label{
  display:block;
  font-size:11px;
  font-family:'DM Mono',monospace;
  letter-spacing:1px;
  color:var(--sage);
  margin-bottom:10px;
  text-transform: uppercase;
}

input{
  width:100%;
  border:1px solid var(--cream3);
  background:var(--cream);
  border-radius:100px;
  padding:16px 22px;
  font-size:15px;
  outline:none;
  color:var(--text);
}

input:focus{
  border-color:var(--sage);
}

button{
  width:100%;
  margin-top:10px;
  border:none;
  border-radius:100px;
  padding:16px;
  background:var(--gold);
  color:var(--white);
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition: opacity 0.2s ease;
}

button:hover{
  opacity:.95;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.success{
  display:none;
  margin-top:20px;
  padding:14px;
  border-radius:12px;
  background:rgba(22,163,74,.08);
  border:1px solid rgba(22,163,74,.2);
  color:var(--success);
  font-size:14px;
}

.error-box {
  display:none;
  margin-top:20px;
  padding:14px;
  border-radius:12px;
  background:rgba(185,28,28,.08);
  border:1px solid rgba(185,28,28,.2);
  color:var(--error);
  font-size:14px;
  line-height:1.5;
}

.back-link{
  display:block;
  text-align:center;
  margin-top:24px;
  color:var(--sage);
  text-decoration:none;
  font-size:14px;
}
</style>
</head>
<body>

<div class="card">

  <a href="/" class="logo">
    <div class="logo-mark">W</div>
    <div class="logo-text">Wissely</div>
  </a>

  <h1>Create New Password</h1>

  <p class="subtitle">
    Enter your new password below.
  </p>

  <form id="updatePasswordForm">
    <div class="form-group">
      <label for="password">New Password</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        placeholder="••••••••"
      >
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        required
        placeholder="••••••••"
      >
    </div>

    <button type="submit" id="submitBtn">
      Reset Password
    </button>
  </form>

  <div id="successBox" class="success">
    Password updated successfully. Redirecting to sign in...
  </div>

  <div id="errorBox" class="error-box"></div>

  <a href="/auth.html?mode=login" class="back-link">
    ← Cancel and Back to Sign In
  </a>

</div>

<script>
document.getElementById('updatePasswordForm').addEventListener('submit', async function(e){
  e.preventDefault();
  
  const passwordInput = document.getElementById('password');
  const confirmPasswordInput = document.getElementById('confirmPassword');
  const submitBtn = document.getElementById('submitBtn');
  const successBox = document.getElementById('successBox');
  const errorBox = document.getElementById('errorBox');
  
  // Clear persistent message boxes
  successBox.style.display = 'none';
  errorBox.style.display = 'none';
  
  const password = passwordInput.value;
  const confirmPassword = confirmPasswordInput.value;

  // Local validation enforcement 
  if (password.length < 8) {
    errorBox.textContent = 'Password must be at least 8 characters long.';
    errorBox.style.display = 'block';
    return;
  }

  if (password !== confirmPassword) {
    errorBox.textContent = 'Passwords do not match. Please verify entries.';
    errorBox.style.display = 'block';
    return;
  }

  // Extract reset token signature query parameters
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  if (!token) {
    errorBox.textContent = 'Security context token is missing or invalid. Please re-request a recovery link.';
    errorBox.style.display = 'block';
    return;
  }

  // Trigger loading UI states
  submitBtn.disabled = true;
  submitBtn.textContent = 'Updating...';
  
  try {
    const response = await fetch('https://wissely-worker.thilinarashmika0727.workers.dev/reset-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        token: token,
        password: password
      })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      successBox.style.display = 'block';
      passwordInput.disabled = true;
      confirmPasswordInput.disabled = true;
      
      // Handle programmatic deferred relocation to authentication gateway
      setTimeout(() => {
        window.location.href = '/auth.html?mode=login';
      }, 2500);
    } else {
      errorBox.textContent = data.error || 'An unexpected server transaction anomaly occurred.';
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    }
  } catch (err) {
    errorBox.textContent = 'System failed to negotiate worker routing synchronization. Check network connections.';
    errorBox.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Reset Password';
  }
});
</script>

</body>
  </html>
